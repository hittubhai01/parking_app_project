name: Android E2E Tests with Backend

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android/sdk
      API_LEVEL: 28
      EMULATOR_NAME: test-emulator
      PYTHON_VERSION: '3.12'
      JAVA_VERSION: 17
      APPIUM_LOG_FILE: appium.log
      TEST_REPORT_FILE: tests/report.html
      APP_PACKAGE: com.example.visionpark

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Vision-Parking/tests/requirements.txt

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools system-images;android-${{ env.API_LEVEL }};google_apis;x86_64 build-tools;28.0.3
          android-sdk-path: ${{ env.ANDROID_SDK_ROOT }}

      - name: Cache Android AVD
        uses: actions/cache@v3
        with:
          path: |
            ~/.android/avd
            ~/.android/adb*
            ~/.android/avd/*.ini
          key: avd-${{ env.API_LEVEL }}-google_apis-x86_64

      - name: Clean up Docker Compose
        run: docker compose -f docker-compose.fastapi.yml down -v
        working-directory: ./Backend
        if: always()

      - name: Start backend with Docker Compose
        run: docker compose -f docker-compose.fastapi.yml up -d
        working-directory: ./Backend

      - name: Wait for database to be ready
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.fastapi.yml exec -T db pg_isready -U parking_user -d parking_db; then break; fi
            sleep 5
          done
        working-directory: ./Backend

      - name: Setup database with seeding file
        run: |
          docker cp COMPLETE_DATABASE_SETUP_FIXED.sql $(docker compose -f docker-compose.fastapi.yml ps -q db):/setup.sql
          docker compose -f docker-compose.fastapi.yml exec -T db psql -U parking_user -d parking_db -f /setup.sql
        working-directory: ./Backend

      - name: Wait for backend API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:5001/health; then exit 0; fi
            sleep 5
          done
          exit 1
        working-directory: ./Backend

      - name: Verify database setup
        run: |
          echo "Verifying database tables and data..."
          docker compose -f docker-compose.fastapi.yml exec -T db psql -U parking_user -d parking_db -c "
            SELECT 
              (SELECT COUNT(*) FROM users) as users,
              (SELECT COUNT(*) FROM parkinglots_details) as parking_lots,
              (SELECT COUNT(*) FROM user_vehicles) as vehicles,
              (SELECT COUNT(*) FROM parking_sessions) as sessions;
          "
        working-directory: ./Backend

      - name: Inject Google Maps API Key
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > Vision-Parking/local.properties

      - name: Make gradlew executable
        run: chmod +x Vision-Parking/gradlew

      - name: Build Android APK
        run: ./gradlew assembleDebug
        working-directory: ./Vision-Parking

      - name: Make run_e2e.sh executable
        run: chmod +x Vision-Parking/run_e2e.sh

      - name: Run E2E tests on emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          APP_PACKAGE: ${{ env.APP_PACKAGE }}
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: Nexus 5
          ram-size: 4096M
          heap-size: 1024M
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -memory 4096 -wipe-data -partition-size 8192 -gpu swiftshader_indirect -camera-back none -camera-front none
          disable-animations: true
          script: |
            echo "Waiting for device..."
            adb wait-for-device
            
            echo "Waiting for system to be ready..."
            adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done'
            
            echo "Waiting for package manager..."
            adb shell 'while ! pm list packages > /dev/null 2>&1; do sleep 1; done'
            
            echo "Waiting for settings service (prevents Appium hidden_api_policy error)..."
            for i in $(seq 1 60); do
              if adb shell cmd settings get global hidden_api_policy > /dev/null 2>&1; then
                echo "Settings service is ready after ${i}s"
                break
              fi
              sleep 1
            done
            
            echo "Extra stabilization wait for framework services..."
            sleep 30
            
            echo "Device ready, granting permissions..."
            adb shell pm grant $APP_PACKAGE android.permission.CAMERA || true
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_COARSE_LOCATION || true
            adb shell pm grant $APP_PACKAGE android.permission.WRITE_EXTERNAL_STORAGE || true
            adb shell pm grant $APP_PACKAGE android.permission.READ_EXTERNAL_STORAGE || true
            
            echo "Installing APK..."
            adb install -r Vision-Parking/app/build/outputs/apk/debug/app-debug.apk
            
            echo "Clearing app data to ensure clean state..."
            adb shell pm clear $APP_PACKAGE || echo "Could not clear app data"
            
            echo "Verifying app installation..."
            adb shell pm list packages | grep $APP_PACKAGE
            
            echo "Starting app to verify it launches..."
            adb shell am start -n $APP_PACKAGE/com.example.visionpark.activities.SplashScreenActivity
            sleep 5
            
            echo "Checking if app is running..."
            adb shell "ps | grep $APP_PACKAGE" || adb shell "ps -A | grep $APP_PACKAGE" || echo "App process not found"
            
            echo "Getting current activity..."
            adb shell dumpsys activity activities | grep "mResumedActivity" || echo "Could not get current activity"
            
            echo "Stopping app before tests..."
            adb shell am force-stop $APP_PACKAGE
            
            echo "Running E2E tests..."
            cd Vision-Parking && timeout 60m ./run_e2e.sh

      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report
          path: Vision-Parking/${{ env.TEST_REPORT_FILE }}
        if: always()

      - name: Upload Appium log
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: ${{ env.APPIUM_LOG_FILE }}
        if: always()

      - name: Clean up Docker Compose
        run: docker compose -f docker-compose.fastapi.yml down -v
        working-directory: ./Backend
        if: always()