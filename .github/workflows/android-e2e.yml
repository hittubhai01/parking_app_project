name: Android E2E Tests with Backend

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android/sdk
      API_LEVEL: 28
      EMULATOR_NAME: test-emulator
      PYTHON_VERSION: '3.12'
      JAVA_VERSION: 17
      APPIUM_LOG_FILE: appium.log
      TEST_REPORT_DIR: Vision-Parking/app/build/reports/androidTests/connected
      JUNIT_REPORT_DIR: Vision-Parking/app/build/outputs/androidTest-results/connected
      APP_PACKAGE: com.example.visionpark

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r Vision-Parking/tests/requirements.txt

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platform-tools system-images;android-${{ env.API_LEVEL }};google_apis;x86_64 build-tools;28.0.3
          android-sdk-path: ${{ env.ANDROID_SDK_ROOT }}

      - name: Start backend
        run: docker compose up -d
        working-directory: ./Backend

      - name: Wait for backend
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:5000/health; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Build APK
        run: ./gradlew assembleDebug
        working-directory: ./Vision-Parking

      - name: Run E2E tests
        uses: ReactiveCircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: Nexus 5
          emulator-options: -no-window -no-audio -no-boot-anim -no-snapshot -wipe-data
          script: |
            adb shell pm grant $APP_PACKAGE android.permission.CAMERA || true
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_COARSE_LOCATION || true

            timeout 20m ./Vision-Parking/gradlew connectedAndroidTest --info --stacktrace

      - name: Upload Android HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-html-report
          path: ${{ env.TEST_REPORT_DIR }}

      - name: Upload JUnit XML Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: ${{ env.JUNIT_REPORT_DIR }}

      - name: Upload Appium Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: ${{ env.APPIUM_LOG_FILE }}

      - name: Cleanup Docker
        if: always()
        run: docker compose down -v
        working-directory: ./Backend
