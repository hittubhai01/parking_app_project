name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.12'
  API_LEVEL: '28'
  APP_PACKAGE: 'com.example.visionpark'

jobs:
  # ────────────────────────────────────────────────────────────
  # JOB 1: Unit tests + APK build (fast, no emulator needed)
  # ────────────────────────────────────────────────────────────
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Inject Maps API key
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" \
            > Vision-Parking/local.properties

      - name: Make gradlew executable
        run: chmod +x Vision-Parking/gradlew

      - name: Run unit tests
        working-directory: Vision-Parking
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        working-directory: Vision-Parking
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: Vision-Parking/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 1

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: Vision-Parking/app/build/reports/tests/
          retention-days: 7

  # ────────────────────────────────────────────────────────────
  # JOB 2: E2E tests on emulator (separate job, longer timeout)
  # ────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests on Emulator
    runs-on: ubuntu-latest
    needs: build-and-unit-tests
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r Vision-Parking/tests/requirements.txt

      # Enable KVM hardware acceleration for the emulator
      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            system-images;android-${{ env.API_LEVEL }};google_apis;x86_64
            build-tools;28.0.3

      - name: Cache Android AVD
        id: avd-cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.API_LEVEL }}-google_apis-x86_64-v1

      - name: Create AVD if not cached
        if: steps.avd-cache.outputs.cache-hit != 'true'
        run: |
          echo "no" | avdmanager create avd \
            -n test-emulator \
            -k "system-images;android-${{ env.API_LEVEL }};google_apis;x86_64" \
            --force

      - name: Download APK from previous job
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: Vision-Parking/app/build/outputs/apk/debug/

      # FIX: Install Appium locally to avoid global EACCES permission error
      - name: Install Appium and UiAutomator2 driver
        working-directory: Vision-Parking
        run: |
          npm install appium@2.11.3 --no-save
          npx appium driver install uiautomator2
          npx appium driver list --installed

      - name: Start backend with Docker Compose
        working-directory: Backend
        run: |
          docker compose -f docker-compose.fastapi.yml down -v 2>/dev/null || true
          docker compose -f docker-compose.fastapi.yml up -d db app nginx
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5001/health > /dev/null 2>&1; then
              echo "Backend is ready"; break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 5
          done

      - name: Seed database
        working-directory: Backend
        run: |
          for i in $(seq 1 20); do
            if docker compose -f docker-compose.fastapi.yml exec -T db pg_isready -U parking_user 2>/dev/null; then
              break
            fi
            sleep 3
          done
          docker cp COMPLETE_DATABASE_SETUP_FIXED.sql \
            "$(docker compose -f docker-compose.fastapi.yml ps -q db)":/setup.sql
          docker compose -f docker-compose.fastapi.yml exec -T db \
            psql -U parking_user -d parking_db -f /setup.sql

      - name: Make run_e2e.sh executable
        run: chmod +x Vision-Parking/run_e2e.sh

      - name: Run E2E tests on emulator
        uses: ReactiveCircus/android-emulator-runner@v2
        env:
          APP_PACKAGE: ${{ env.APP_PACKAGE }}
          APPIUM_LOG_FILE: /tmp/appium.log
        with:
          api-level: ${{ env.API_LEVEL }}
          target: google_apis
          arch: x86_64
          profile: Nexus 5
          ram-size: 2048M
          heap-size: 512M
          force-avd-creation: false
          emulator-options: >-
            -no-window -no-audio -no-boot-anim
            -no-snapshot -wipe-data
            -gpu swiftshader_indirect
            -camera-back none -camera-front none
          disable-animations: true
          script: |
            echo "Device ready — granting permissions..."
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_FINE_LOCATION || true
            adb shell pm grant $APP_PACKAGE android.permission.ACCESS_COARSE_LOCATION || true
            echo "Installing APK..."
            adb install -r Vision-Parking/app/build/outputs/apk/debug/app-debug.apk
            echo "Running E2E tests..."
            cd Vision-Parking && timeout 80m ./run_e2e.sh

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: Vision-Parking/tests/report.html
          retention-days: 7

      - name: Upload Appium log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: appium-log
          path: /tmp/appium.log
          retention-days: 7

      - name: Stop backend
        if: always()
        working-directory: Backend
        run: docker compose -f docker-compose.fastapi.yml down -v