name: Android CI

on:
  push:
    paths:
      - "Vision-Parking/**"
  pull_request:
    paths:
      - "Vision-Parking/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        working-directory: Vision-Parking
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: Vision-Parking
        run: ./gradlew build --no-daemon

      - name: Run Android unit tests
        working-directory: Vision-Parking
        run: ./gradlew test --no-daemon
        # Note: connectedAndroidTest requires a running emulator and is NOT run here.
        # Use a separate workflow with emulator-wtf or Firebase Test Lab for instrumented tests.
