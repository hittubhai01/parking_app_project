# Enhanced Backend CI workflow for Dockerized Flask app
# Runs only when Backend/ changes, builds containers, runs comprehensive tests, uploads artifacts
name: Backend CI

on:
  push:
    paths:
      - 'Backend/**'
  pull_request:
    paths:
      - 'Backend/**'
  schedule:
    # Run backend tests daily at 1 AM UTC
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - security
          - performance

env:
  COMPOSE_PROJECT_NAME: backend-ci-${{ github.run_id }}

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    
    services:
      # Use GitHub's PostgreSQL service for more reliable testing
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: parking_user
          POSTGRES_PASSWORD: parking_password
          POSTGRES_DB: parking_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (for scripts if needed)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create necessary directories
        run: |
          mkdir -p Backend/test-results
          mkdir -p Backend/htmlcov

      # Build containers
      - name: Build containers
        run: docker compose build
        working-directory: ./Backend

      # Start only the app container (use GitHub's PostgreSQL service)
      - name: Start app container
        run: |
          docker compose up -d app
        working-directory: ./Backend
        env:
          DATABASE_URL: postgresql://parking_user:parking_password@localhost:5432/parking_db

      # Wait for DB to be ready
      - name: Wait for DB to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U parking_user; then
              echo "Database is ready!"; break
            fi
            echo "Waiting for database... (attempt $i/30)"; sleep 2
          done

      # Wait for app to be ready
      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:5000/health > /dev/null 2>&1 || curl -f http://localhost:5000/ > /dev/null 2>&1; then
              echo "App is ready!"; break
            fi
            echo "Waiting for app... (attempt $i/30)"; sleep 2
          done

      # Run DB migrations
      - name: Run DB migrations
        run: docker compose exec -T app flask db upgrade
        working-directory: ./Backend

      # Populate database if SQL file exists
      - name: Populate database (if SQL file exists)
        run: |
          if [ -f Backend/populate_parking_data.sql ]; then
            echo "Found populate_parking_data.sql, loading data..."
            PGPASSWORD=parking_password psql -h localhost -U parking_user -d parking_db -f Backend/populate_parking_data.sql
          else
            echo "No populate_parking_data.sql found, skipping population."
          fi

      # Install test dependencies in container
      - name: Install test dependencies
        run: |
          docker compose exec -T app pip install pytest pytest-html pytest-cov pytest-xdist pytest-benchmark
        working-directory: ./Backend

      # Run tests based on input type with proper step IDs
      - name: Run unit tests
        id: unit-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'unit' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest tests/test_auth.py tests/test_parking.py tests/test_admin_api.py tests/test_config.py --cov=app --cov-report=html:htmlcov/unit --cov-report=xml:coverage-unit.xml --junitxml=test-results/unit-test-report.xml --html=test-results/unit-test-report.html -v"
        working-directory: ./Backend

      - name: Run integration tests
        id: integration-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest tests/test_integration.py --cov=app --cov-append --cov-report=html:htmlcov/integration --cov-report=xml:coverage-integration.xml --junitxml=test-results/integration-test-report.xml --html=test-results/integration-test-report.html -v -m integration"
        working-directory: ./Backend

      - name: Run security tests
        id: security-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'security' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest tests/test_security.py tests/test_security_comprehensive.py --junitxml=test-results/security-test-report.xml --html=test-results/security-test-report.html -v -m security"
        working-directory: ./Backend

      - name: Run performance tests
        id: performance-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'performance' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest tests/test_performance.py --junitxml=test-results/performance-test-report.xml --html=test-results/performance-test-report.html -v || echo 'Performance tests completed'"
        working-directory: ./Backend

      - name: Run comprehensive tests
        id: comprehensive-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == 'integration' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest tests/test_database_constraints.py tests/test_edge_cases.py tests/test_concurrency.py tests/test_error_recovery.py --junitxml=test-results/comprehensive-test-report.xml --html=test-results/comprehensive-test-report.html -v || echo 'Comprehensive tests completed'"
        working-directory: ./Backend

      # Run all tests with coverage and save debug log
      - name: Run all tests with coverage
        id: all-tests
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "pytest --cov=app --cov-report=html:htmlcov/all --cov-report=xml:coverage.xml --junitxml=test-results/pytest-report.xml --html=test-results/pytest-report.html -v | tee /app/test-results/pytest-debug.log"
        working-directory: ./Backend

      # Generate combined coverage report
      - name: Generate combined coverage report
        if: ${{ github.event.inputs.test_type == 'all' || github.event.inputs.test_type == '' }}
        run: |
          docker compose exec -T app bash -c "coverage combine coverage-*.xml && coverage html -d htmlcov/combined && coverage xml -o coverage.xml"
        working-directory: ./Backend

      # Copy test results and reports from container
      - name: Copy test artifacts from container
        if: always()
        run: |
          # Create local directories
          mkdir -p test-artifacts/htmlcov test-artifacts/test-results
          
          # Copy coverage reports
          docker cp $(docker compose ps -q app):/app/htmlcov/. test-artifacts/htmlcov/ || echo "Coverage reports not found"
          
          # Copy test results
          docker cp $(docker compose ps -q app):/app/test-results/. test-artifacts/test-results/ || echo "Test results not found"
          
          # Copy any coverage XML files
          docker cp $(docker compose ps -q app):/app/coverage.xml test-artifacts/coverage.xml 2>/dev/null || echo "Coverage XML not found"
          docker cp $(docker compose ps -q app):/app/coverage-*.xml test-artifacts/ 2>/dev/null || echo "Individual coverage files not found"
          
          # List what we copied
          echo "Copied artifacts:"
          find test-artifacts -type f | head -20

      # Upload coverage report artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-report
          path: |
            test-artifacts/htmlcov/
            test-artifacts/coverage.xml
            test-artifacts/coverage-*.xml
          retention-days: 30

      # Upload test reports
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: |
            test-artifacts/test-results/
          retention-days: 30

      # Upload debug logs
      - name: Upload debug logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-debug-logs
          path: |
            test-artifacts/test-results/pytest-debug.log
          retention-days: 30

      # Upload coverage to Codecov
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        if: always()
        with:
          file: test-artifacts/coverage.xml
          flags: backend-ci
          name: backend-ci-coverage
          fail_ci_if_error: false

      # Generate test summary
      - name: Generate test summary
        if: always()
        run: |
          echo "# Backend CI Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get test results
          UNIT_STATUS="${{ steps.unit-tests.outcome || 'skipped' }}"
          INTEGRATION_STATUS="${{ steps.integration-tests.outcome || 'skipped' }}"
          SECURITY_STATUS="${{ steps.security-tests.outcome || 'skipped' }}"
          PERFORMANCE_STATUS="${{ steps.performance-tests.outcome || 'skipped' }}"
          COMPREHENSIVE_STATUS="${{ steps.comprehensive-tests.outcome || 'skipped' }}"
          ALL_STATUS="${{ steps.all-tests.outcome || 'skipped' }}"
          
          echo "| Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ github.event.inputs.test_type }}" == "all" ] || [ "${{ github.event.inputs.test_type }}" == "" ]; then
            echo "| All Tests | $ALL_STATUS |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Unit Tests | $UNIT_STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| Integration Tests | $INTEGRATION_STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| Security Tests | $SECURITY_STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| Performance Tests | $PERFORMANCE_STATUS |" >> $GITHUB_STEP_SUMMARY
            echo "| Comprehensive Tests | $COMPREHENSIVE_STATUS |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 📊 Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Coverage Reports**: Available in 'backend-coverage-report' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Reports**: Available in 'backend-test-reports' artifact" >> $GITHUB_STEP_SUMMARY
          echo "- **Debug Logs**: Available in 'backend-debug-logs' artifact" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "## 🐳 Container Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          docker compose ps >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      # Clean up containers after job
      - name: Clean up containers
        if: always()
        run: docker compose down -v --remove-orphans

        working-directory: ./Backend
