name: Backend CI

on:
  push:
    paths: ['Backend/**']
  pull_request:
    paths: ['Backend/**']
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  BACKEND_DIR: 'Backend'
  APP_DIR: 'Backend/fastapi_app'

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Backend/fastapi_app/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ${{ env.APP_DIR }}/requirements.txt
          pip install pytest-html pytest-cov

      - name: Create test-results directory
        run: mkdir -p ${{ env.APP_DIR }}/tests/test-results

      - name: Run all tests
        id: tests
        working-directory: ${{ env.BACKEND_DIR }}
        env:
          DATABASE_URL: sqlite:////tmp/test_ci.db
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-key
          RPI_API_KEY: ci-test-rpi-key
        run: |
          python -m pytest fastapi_app/tests/ \
            -v --tb=short \
            --junitxml=fastapi_app/tests/test-results/results.xml \
            --html=fastapi_app/tests/test-results/results.html \
            --self-contained-html \
            --cov=fastapi_app \
            --cov-report=xml:fastapi_app/tests/test-results/coverage.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-reports
          path: ${{ env.APP_DIR }}/tests/test-results/
          retention-days: 30

      - name: Write job summary
        if: always()
        run: |
          echo "## Backend CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "Tests: **${{ steps.tests.outcome }}**" >> "$GITHUB_STEP_SUMMARY"