events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # FULLY DISABLE GZIP - Critical for Android OkHttp compatibility
    # The "unexpected end of stream" errors were caused by gzip compression
    # OkHttp expects uncompressed responses from the backend
    gzip off;
    
    server {
        listen 80;
        
        # Increase client body size for large requests
        client_max_body_size 10M;
        client_body_buffer_size 128k;
        
        location / {
            proxy_pass http://app:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Connection settings to prevent stream corruption
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Timeout settings for large responses
            proxy_connect_timeout 120s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
            
            # Stable buffer settings that work with OkHttp
            # These values handle the ~80KB nearby parking response without chunking
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 8 32k;
            proxy_busy_buffers_size 64k;
            proxy_temp_file_write_size 128k;
            
            # Prevent connection drops
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://app:5000/health;
            proxy_connect_timeout 5s;
            proxy_send_timeout 5s;
            proxy_read_timeout 5s;
        }
    }
}
